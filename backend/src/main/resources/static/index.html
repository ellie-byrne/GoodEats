<!-- Add this below the search container and above the filters in index.html -->
<div class="user-controls" id="user-restaurant-controls" style="display: none;">
    <button id="add-restaurant-button" class="button add-button">Add Restaurant</button>
</div>

<!-- Add Restaurant Modal -->
<div id="add-restaurant-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="toggleAddRestaurantModal()">&times;</span>
        <h2>Add New Restaurant</h2>
        <form id="add-restaurant-form">
            <input type="text" id="restaurant-name" name="name" placeholder="Restaurant Name" required />
            <input type="text" id="restaurant-type" name="type" placeholder="Restaurant Type" required />
            <input type="text" id="restaurant-borough" name="borough" placeholder="Borough" required />
            <input type="text" id="restaurant-photo" name="storePhoto" placeholder="Photo URL (optional)" />
            <button type="submit">Add Restaurant</button>
        </form>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-confirm-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="toggleDeleteConfirmModal()">&times;</span>
        <h2>Confirm Deletion</h2>
        <p>Are you sure you want to delete this restaurant?</p>
        <div class="modal-buttons">
            <button id="confirm-delete-button" class="button danger-button">Delete</button>
            <button onclick="toggleDeleteConfirmModal()" class="button cancel-button">Cancel</button>
        </div>
    </div>
</div>
